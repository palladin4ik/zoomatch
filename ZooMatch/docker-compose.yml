services:

  db:
    image: postgres:17
    restart: always
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 ZooMatch.asgi:application
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
  
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A ZooMatch worker -l info
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
  
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A ZooMatch beat -l info
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data: